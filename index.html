<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Project Zero Style</title>
    <style>
        body {
            font-family: 'Roboto Mono', 'Courier New', Courier, monospace;
            line-height: 1.6;
            color: #3c4043;
            background-color: #ffffff;
            margin: 0;
            padding: 40px 80px;
            max-width: 900px;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 500;
            color: #202124;
            border-bottom: 1px solid #e8eaed;
            padding-bottom: 20px;
            margin-bottom: 30px;
            letter-spacing: -0.5px;
        }


        p {
            margin-top: 20px;
        }

        a {
            color: #1a73e8;
            text-decoration: none;
            font-weight: bold;
            padding: 8px 16px;
            border: 1px solid #e8eaed;
            border-radius: 4px;
            transition: background-color 0.2s, border-color 0.2s;
        }

        a:hover {
            background-color: #f8f9fa;
            border-color: #1a73e8;
            text-decoration: underline;
        }
        .meta-info {
            margin-top: 100px;
            font-size: 0.85rem;
            color: #70757a;
            border-top: 1px solid #e8eaed;
            padding-top: 10px;
        }
    </style>
</head>
<body>

    <h1>Peta desa data untuk RT/RW</h1>
    
    <p>
        <a href="peta.html">VIEW MAP (PETA) &rarr;</a>
    </p>

    <div class="meta-info">
        Desa Pataruman Digitalization Project | Intern-Report-2026
    </div>

</body>
</html>
